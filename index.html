<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>修狗 × 面癱貓｜戀愛人格測驗</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --black: #111;
  --white: #FAFAF8;
  --soft: #F3F1EC;
  --mid: #E4E1DB;
  --gray: #9A9690;
  --radius: 18px;
  --accent: #F0C84A;
}

body {
  font-family: 'Noto Sans TC', sans-serif;
  background: var(--soft);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  -webkit-font-smoothing: antialiased;
}

.phone {
  width: 100%;
  max-width: 430px;
  min-height: 100vh;
  background: var(--white);
  position: relative;
  overflow: hidden;
}

/* ── SCREENS ── */
.screen {
  position: absolute;
  inset: 0;
  overflow-y: auto;
  transition: opacity 0.3s ease, transform 0.3s ease;
}
.screen.hidden { opacity: 0; pointer-events: none; transform: translateX(28px); }
.screen.exit   { opacity: 0; transform: translateX(-28px); }

/* ══════════════════════════════
   COVER
══════════════════════════════ */
#cover { display: flex; flex-direction: column; }

.cover-img {
  width: 100%;
  aspect-ratio: 1 / 1;
  background: var(--mid);
  position: relative;
  overflow: hidden;
  flex-shrink: 0;
}
.cover-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
.cover-placeholder {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 10px;
}
.cover-placeholder-emoji { font-size: 80px; }
.cover-placeholder-text  { font-size: 12px; color: var(--gray); letter-spacing: 0.05em; }

.cover-body { padding: 28px 28px 48px; display: flex; flex-direction: column; flex: 1; }

.cover-eyebrow {
  font-size: 11px; font-weight: 500; color: var(--gray);
  letter-spacing: 0.18em; text-transform: uppercase; margin-bottom: 14px;
}
.cover-title {
  font-size: 32px; font-weight: 900; line-height: 1.2;
  letter-spacing: -0.02em; margin-bottom: 14px;
}
.cover-desc {
  font-size: 14px; font-weight: 300; color: #666;
  line-height: 1.9; margin-bottom: 32px; flex: 1;
}
.cover-start {
  width: 100%; padding: 18px;
  background: var(--black); color: var(--white);
  border: none; border-radius: var(--radius);
  font-family: inherit; font-size: 15px; font-weight: 700;
  cursor: pointer; letter-spacing: 0.05em;
  transition: opacity 0.2s;
}
.cover-start:hover { opacity: 0.78; }

/* ══════════════════════════════
   QUIZ
══════════════════════════════ */
#quiz { display: flex; flex-direction: column; }

.quiz-nav {
  display: flex; align-items: center; justify-content: space-between;
  padding: 20px 24px 16px;
}
.back-btn {
  width: 36px; height: 36px; border-radius: 50%;
  border: 1.5px solid var(--mid); background: none;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; cursor: pointer; color: var(--black);
  transition: border-color 0.2s;
}
.back-btn:hover { border-color: var(--black); }

.dots { display: flex; gap: 6px; align-items: center; }
.dot {
  width: 6px; height: 6px; border-radius: 3px;
  background: var(--mid); transition: all 0.3s ease;
}
.dot.active { width: 20px; background: var(--black); }
.dot.done   { background: var(--black); }

.q-count { font-size: 12px; color: var(--gray); font-weight: 500; }

.q-img {
  width: 100%; aspect-ratio: 3/2;
  background: var(--soft); position: relative; overflow: hidden;
}
.q-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
.q-img-placeholder {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 56px;
}

.q-body { padding: 22px 24px 0; }
.q-text {
  font-size: 20px; font-weight: 700; line-height: 1.5;
  letter-spacing: -0.01em; margin-bottom: 22px;
}

.opts { padding: 0 24px 20px; display: flex; flex-direction: column; gap: 10px; }

.opt {
  width: 100%; padding: 15px 18px;
  background: var(--soft); border: 2px solid transparent;
  border-radius: var(--radius);
  font-family: inherit; font-size: 14px; font-weight: 400;
  color: var(--black); text-align: left; cursor: pointer;
  line-height: 1.6; transition: all 0.18s ease;
  display: flex; align-items: center; gap: 14px;
}
.opt:hover { background: var(--mid); }
.opt.selected { background: var(--black); color: var(--white); border-color: var(--black); }

.opt-lbl {
  width: 28px; height: 28px; border-radius: 50%;
  border: 1.5px solid var(--mid); flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; color: var(--gray);
  transition: all 0.18s;
}
.opt.selected .opt-lbl { background: var(--white); border-color: var(--white); color: var(--black); }
.opt:hover:not(.selected) .opt-lbl { border-color: #bbb; color: var(--black); }

.quiz-next {
  margin: 4px 24px 36px;
  width: calc(100% - 48px); padding: 17px;
  background: var(--black); color: var(--white);
  border: none; border-radius: var(--radius);
  font-family: inherit; font-size: 15px; font-weight: 700;
  cursor: pointer; letter-spacing: 0.05em;
  opacity: 0; pointer-events: none;
  transition: opacity 0.25s;
}
.quiz-next.on { opacity: 1; pointer-events: auto; }
.quiz-next:hover { opacity: 0.78; }

/* ══════════════════════════════
   RESULT  — matches reference
══════════════════════════════ */
#result { display: flex; flex-direction: column; }

.r-img {
  width: 100%; aspect-ratio: 4/3;
  background: var(--mid); position: relative; overflow: hidden;
  border-radius: 0 0 24px 24px;
  flex-shrink: 0;
}
.r-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
.r-img-ph {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 8px;
}
.r-emoji-big {
  font-size: 80px;
  animation: pop 0.5s cubic-bezier(0.175,0.885,0.32,1.275) both;
}
.r-img-label { font-size: 11px; color: var(--gray); letter-spacing: 0.05em; }

.r-body { padding: 24px 24px 48px; }

/* name + accent line */
.r-name-row { margin-bottom: 16px; }
.r-name {
  font-size: 26px; font-weight: 900; line-height: 1.25;
  letter-spacing: -0.02em; display: inline;
}
.r-name-bar {
  height: 5px; background: var(--accent);
  border-radius: 3px; margin-top: 6px;
  width: 60px;
}

/* hashtags */
.r-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
.r-tag {
  padding: 5px 12px;
  border: 1.5px solid var(--mid);
  border-radius: 999px;
  font-size: 12px; font-weight: 500; color: #555;
}

/* stat row */
.r-stats {
  display: flex; border: 1px dashed var(--mid);
  border-radius: 14px; overflow: hidden;
  margin-bottom: 20px;
}
.r-stat {
  flex: 1; padding: 16px 12px; text-align: center;
}
.r-stat + .r-stat { border-left: 1px dashed var(--mid); }
.r-stat-label { font-size: 11px; color: var(--gray); margin-bottom: 4px; }
.r-stat-val   { font-size: 26px; font-weight: 900; letter-spacing: -0.02em; }

/* desc card */
.r-desc-card {
  background: var(--soft); border-radius: 14px;
  padding: 18px; margin-bottom: 24px;
  font-size: 14px; font-weight: 300; color: #444; line-height: 2;
}

/* share section */
.r-share-label {
  text-align: center; font-size: 12px; color: var(--gray);
  margin-bottom: 12px; letter-spacing: 0.03em;
}

.r-share-row { display: flex; gap: 10px; margin-bottom: 10px; }

.r-share-btn {
  flex: 1; display: flex; align-items: center; justify-content: center;
  gap: 8px; padding: 15px 10px;
  border-radius: var(--radius);
  font-family: inherit; font-size: 13px; font-weight: 700;
  text-decoration: none; cursor: pointer; border: none;
  transition: opacity 0.2s; letter-spacing: 0.02em;
}
.r-share-btn:hover { opacity: 0.8; }
.btn-copy    { background: var(--soft); color: var(--black); border: 1.5px solid var(--mid); }
.btn-line    { background: #06C755; color: #fff; }
.btn-threads { background: #111; color: #fff; }

.copy-row { display: flex; gap: 10px; margin-bottom: 10px; }
.btn-copy-full {
  flex: 1; padding: 15px;
  background: var(--soft); color: var(--black);
  border: 1.5px solid var(--mid); border-radius: var(--radius);
  font-family: inherit; font-size: 13px; font-weight: 700;
  cursor: pointer; transition: all 0.2s; letter-spacing: 0.03em;
}
.btn-copy-full:hover { border-color: var(--black); }
.btn-copy-full.copied { border-color: #4A9B7F; color: #4A9B7F; }

.r-retry {
  width: 100%; padding: 15px;
  background: transparent; color: var(--gray);
  border: 1.5px solid var(--mid); border-radius: var(--radius);
  font-family: inherit; font-size: 13px; font-weight: 500;
  cursor: pointer; transition: all 0.2s; letter-spacing: 0.03em;
  margin-bottom: 20px;
}
.r-retry:hover { border-color: var(--black); color: var(--black); }

.r-credit { text-align: center; font-size: 11px; color: #ccc; letter-spacing: 0.08em; }

/* ── ANIMATIONS ── */
@keyframes pop {
  from { transform: scale(0.5); opacity: 0; }
  to   { transform: scale(1);   opacity: 1; }
}
@keyframes up {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}
.anim { animation: up 0.35s ease both; }
</style>
</head>

const LABELS = ['A','B','C'];
let cur = 0, total = 0, sel = null;

function buildDots() {
  const w = document.getElementById('dots');
  w.innerHTML = '';
  Qs.forEach((_,i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i < cur ? ' done' : i === cur ? ' active' : '');
    w.appendChild(d);
  });
}

function renderQ() {
  const q = Qs[cur];
  sel = null;
  buildDots();
  document.getElementById('qCount').textContent = `${cur+1} / ${Qs.length}`;
  document.getElementById('qEmoji').textContent = q.emoji;
  document.getElementById('qText').textContent = q.q;
  document.getElementById('nextBtn').classList.remove('on');

  const wrap = document.getElementById('opts');
  wrap.innerHTML = '';
  q.opts.forEach((o,i) => {
    const btn = document.createElement('button');
    btn.className = 'opt anim';
    btn.style.animationDelay = (i*0.07)+'s';
    btn.innerHTML = `<span class="opt-lbl">${LABELS[i]}</span><span>${o.t}</span>`;
    btn.onclick = () => {
      wrap.querySelectorAll('.opt').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      sel = o.s;
      document.getElementById('nextBtn').classList.add('on');
    };
    wrap.appendChild(btn);
  });
}

function switchScreen(from, to) {
  const f = document.getElementById(from);
  const t = document.getElementById(to);
  f.classList.add('exit');
  setTimeout(() => {
    f.classList.remove('exit');
    f.classList.add('hidden');
    t.classList.remove('hidden');
    t.scrollTop = 0;
  }, 280);
}

function startQuiz() {
  cur = 0; total = 0; sel = null;
  renderQ();
  switchScreen('cover','quiz');
}

function next() {
  if (sel === null) return;
  total += sel; cur++;
  if (cur >= Qs.length) { showResult(); return; }

  const opts = document.getElementById('opts');
  opts.style.cssText = 'opacity:0;transform:translateX(-14px);transition:all 0.2s ease';
  document.getElementById('nextBtn').classList.remove('on');
  document.getElementById('quiz').scrollTop = 0;
  setTimeout(() => {
    opts.style.cssText = '';
    renderQ();
  }, 200);
}

function goBack() {
  if (cur === 0) { switchScreen('quiz','cover'); return; }
  cur--; total = 0; renderQ();
}

function showResult() {
  const r = Rs.find(x => total >= x.min && total <= x.max);

  // inject SVG illustration
  const imgWrap = document.getElementById('rImg');
  imgWrap.innerHTML = ResultSVGs[r.img];

  document.getElementById('rName').textContent = r.name;
  document.getElementById('rDesc').textContent = r.desc;

  const tagWrap = document.getElementById('rTags');
  tagWrap.innerHTML = '';
  r.tags.forEach(tag => {
    const el = document.createElement('span');
    el.className = 'r-tag'; el.textContent = tag;
    tagWrap.appendChild(el);
  });

  document.getElementById('rStat1Label').textContent = r.stat1.label;
  document.getElementById('rStat1Val').textContent   = r.stat1.val;
  document.getElementById('rStat2Label').textContent = r.stat2.label;
  document.getElementById('rStat2Val').textContent   = r.stat2.val;

  const url = encodeURIComponent(window.location.href);
  const text = encodeURIComponent(
    `我的戀愛人格是「${r.name}」${r.emoji}\n來測測你是哪種戀愛生物？\n#修狗 #面癱貓 #sansanink`
  );
  const lineText = encodeURIComponent(
    `我的戀愛人格是「${r.name}」${r.emoji}\n來測測你是哪種戀愛生物？\n#修狗 #面癱貓 #sansanink\n${window.location.href}`
  );

  const lineBtn = document.getElementById('lineBtn');
  lineBtn.href = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent)
    ? `https://line.me/R/share?text=${lineText}`
    : `https://social-plugins.line.me/lineit/share?url=${url}&text=${lineText}`;

  document.getElementById('threadsBtn').href =
    `https://www.threads.net/intent/post?text=${text}%0A${url}`;

  const btn = document.getElementById('copyBtn');
  btn.textContent = '📋 複製測驗連結';
  btn.classList.remove('copied');

  switchScreen('quiz','result');
}

function copyUrl() {
  navigator.clipboard.writeText(window.location.href).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = '✓ 已複製！';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = '📋 複製測驗連結';
      btn.classList.remove('copied');
    }, 2500);
  });
}

function restart() {
  cur = 0; total = 0; sel = null;
  renderQ();
  switchScreen('result','cover');
}
</script>
