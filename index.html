<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>修狗 × 面癱貓｜戀愛人格測驗</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --black: #111;
  --white: #FAFAF8;
  --soft: #F3F1EC;
  --mid: #E4E1DB;
  --gray: #9A9690;
  --radius: 18px;
  --accent: #F0C84A;
}

body {
  font-family: 'Noto Sans TC', sans-serif;
  background: var(--soft);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  -webkit-font-smoothing: antialiased;
}

.phone {
  width: 100%;
  max-width: 430px;
  min-height: 100vh;
  background: var(--white);
  position: relative;
  overflow: hidden;
}

/* ── SCREENS ── */
.screen {
  position: absolute;
  inset: 0;
  overflow-y: auto;
  transition: opacity 0.3s ease, transform 0.3s ease;
}
.screen.hidden { opacity: 0; pointer-events: none; transform: translateX(28px); }
.screen.exit   { opacity: 0; transform: translateX(-28px); }

/* ══════════════════════════════
   COVER
══════════════════════════════ */
#cover {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  overflow: hidden;
}
.cover-fullscreen {
  position: relative;
  width: 100%; flex: 1;
  display: flex; flex-direction: column;
  overflow: hidden;
}
.cover-svg {
  width: 100%; flex: 1;
  display: block; min-height: 0;
}
.cover-photo {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover; z-index: 1;
}
.cover-overlay {
  position: relative; z-index: 2;
  padding: 20px 28px 36px;
  background: linear-gradient(to top, #FAFAF8 70%, transparent 100%);
  flex-shrink: 0;
}
.cover-eyebrow {
  font-size: 11px; font-weight: 500; color: var(--gray);
  letter-spacing: 0.18em; text-transform: uppercase; margin-bottom: 10px;
}
.cover-title {
  font-size: 30px; font-weight: 900; line-height: 1.2;
  letter-spacing: -0.02em; margin-bottom: 10px;
}
.cover-desc {
  font-size: 13px; font-weight: 300; color: #666;
  line-height: 1.9; margin-bottom: 24px;
}
.cover-start {
  width: 100%; padding: 18px;
  background: var(--black); color: var(--white);
  border: none; border-radius: var(--radius);
  font-family: inherit; font-size: 15px; font-weight: 700;
  cursor: pointer; letter-spacing: 0.05em;
  transition: opacity 0.2s;
}
.cover-start:hover { opacity: 0.78; }

/* ══════════════════════════════
   QUIZ
══════════════════════════════ */
#quiz { display: flex; flex-direction: column; }

.quiz-nav {
  display: flex; align-items: center; justify-content: space-between;
  padding: 20px 24px 16px;
}
.back-btn {
  width: 36px; height: 36px; border-radius: 50%;
  border: 1.5px solid var(--mid); background: none;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; cursor: pointer; color: var(--black);
  transition: border-color 0.2s;
}
.back-btn:hover { border-color: var(--black); }

.dots { display: flex; gap: 6px; align-items: center; }
.dot {
  width: 6px; height: 6px; border-radius: 3px;
  background: var(--mid); transition: all 0.3s ease;
}
.dot.active { width: 20px; background: var(--black); }
.dot.done   { background: var(--black); }

.q-count { font-size: 12px; color: var(--gray); font-weight: 500; }

.q-img-area {
  width: 100%; height: 56vw; min-height: 260px; max-height: 400px;
  position: relative; overflow: hidden;
  background: var(--soft);
  background-size: cover; background-position: center;
  flex-shrink: 0;
}
.q-img-placeholder {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 80px;
}
.quiz-nav-float {
  position: absolute; top: 0; left: 0; right: 0;
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 18px;
  z-index: 2;
}
.back-btn-float {
  width: 32px; height: 32px; border-radius: 50%;
  border: 1.5px solid rgba(0,0,0,0.2);
  background: rgba(255,255,255,0.6);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; cursor: pointer; color: var(--black);
}
.q-count { font-size: 12px; font-weight: 500; color: var(--black); }

.q-body { padding: 22px 24px 0; }
.q-text {
  font-size: 20px; font-weight: 700; line-height: 1.5;
  letter-spacing: -0.01em; margin-bottom: 22px;
}

.opts { padding: 0 24px 20px; display: flex; flex-direction: column; gap: 10px; }

.opt {
  width: 100%; padding: 15px 18px;
  background: var(--soft); border: 2px solid transparent;
  border-radius: var(--radius);
  font-family: inherit; font-size: 14px; font-weight: 400;
  color: var(--black); text-align: left; cursor: pointer;
  line-height: 1.6; transition: all 0.18s ease;
  display: flex; align-items: center; gap: 14px;
}
.opt:hover { background: var(--mid); }
.opt.selected { background: var(--black); color: var(--white); border-color: var(--black); }

.opt-lbl {
  width: 28px; height: 28px; border-radius: 50%;
  border: 1.5px solid var(--mid); flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; color: var(--gray);
  transition: all 0.18s;
}
.opt.selected .opt-lbl { background: var(--white); border-color: var(--white); color: var(--black); }
.opt:hover:not(.selected) .opt-lbl { border-color: #bbb; color: var(--black); }

.quiz-next {
  margin: 4px 24px 36px;
  width: calc(100% - 48px); padding: 17px;
  background: var(--black); color: var(--white);
  border: none; border-radius: var(--radius);
  font-family: inherit; font-size: 15px; font-weight: 700;
  cursor: pointer; letter-spacing: 0.05em;
  opacity: 0; pointer-events: none;
  transition: opacity 0.25s;
}
.quiz-next.on { opacity: 1; pointer-events: auto; }
.quiz-next:hover { opacity: 0.78; }

/* ══════════════════════════════
   RESULT  — matches reference
══════════════════════════════ */
#result { display: flex; flex-direction: column; }

.r-img {
  width: 100%; aspect-ratio: 4/3;
  background: var(--mid); position: relative; overflow: hidden;
  border-radius: 0 0 24px 24px;
  flex-shrink: 0;
}
.r-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
.r-img-ph {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 8px;
}
.r-emoji-big {
  font-size: 80px;
  animation: pop 0.5s cubic-bezier(0.175,0.885,0.32,1.275) both;
}
.r-img-label { font-size: 11px; color: var(--gray); letter-spacing: 0.05em; }

.r-body { padding: 24px 24px 48px; }

/* name + accent line */
.r-name-row { margin-bottom: 16px; }
.r-name {
  font-size: 26px; font-weight: 900; line-height: 1.25;
  letter-spacing: -0.02em; display: inline;
}
.r-name-bar {
  height: 5px; background: var(--accent);
  border-radius: 3px; margin-top: 6px;
  width: 60px;
}

/* hashtags */
.r-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
.r-tag {
  padding: 5px 12px;
  border: 1.5px solid var(--mid);
  border-radius: 999px;
  font-size: 12px; font-weight: 500; color: #555;
}

/* stat row */
.r-stats {
  display: flex; border: 1px dashed var(--mid);
  border-radius: 14px; overflow: hidden;
  margin-bottom: 20px;
}
.r-stat {
  flex: 1; padding: 16px 12px; text-align: center;
}
.r-stat + .r-stat { border-left: 1px dashed var(--mid); }
.r-stat-label { font-size: 11px; color: var(--gray); margin-bottom: 4px; }
.r-stat-val   { font-size: 26px; font-weight: 900; letter-spacing: -0.02em; }

/* desc card */
.r-desc-card {
  background: var(--soft); border-radius: 14px;
  padding: 18px; margin-bottom: 24px;
  font-size: 14px; font-weight: 300; color: #444; line-height: 2;
}

.r-roast {
  background: #111; color: #fff;
  border-radius: var(--radius);
  padding: 14px 18px;
  font-size: 13px; font-weight: 500;
  line-height: 1.7; margin-bottom: 20px;
  text-align: center; letter-spacing: 0.02em;
}

/* match row */
.r-match-row {
  display: flex; gap: 10px; margin-bottom: 24px;
}
.r-match-box {
  flex: 1; padding: 16px; border-radius: var(--radius);
  display: flex; flex-direction: column; gap: 6px;
}
.r-match-yes { background: #FFF0F3; border: 1.5px solid #F5C4D1; }
.r-match-no  { background: var(--soft); border: 1.5px solid var(--mid); }
.r-match-label {
  font-size: 11px; font-weight: 500;
  color: var(--gray); letter-spacing: 0.05em;
}
.r-match-name {
  font-size: 13px; font-weight: 700; color: var(--black);
}
.r-match-desc {
  font-size: 12px; font-weight: 300; color: #666; line-height: 1.6;
}

.r-match-img {
  width: 100%; aspect-ratio: 1/1;
  border-radius: 10px; overflow: hidden;
  background: var(--white);
  margin-bottom: 8px;
  display: flex; align-items: center; justify-content: center;
}
.r-match-img img { width:100%; height:100%; object-fit:cover; display:block; }
.r-match-img-ph { font-size: 36px; }

/* share section */
.r-share-label {
  text-align: center; font-size: 12px; color: var(--gray);
  margin-bottom: 12px; letter-spacing: 0.03em;
}

.r-share-row { display: flex; gap: 10px; margin-bottom: 10px; }

.r-share-btn {
  flex: 1; display: flex; align-items: center; justify-content: center;
  gap: 8px; padding: 15px 10px;
  border-radius: var(--radius);
  font-family: inherit; font-size: 13px; font-weight: 700;
  text-decoration: none; cursor: pointer; border: none;
  transition: opacity 0.2s; letter-spacing: 0.02em;
}
.r-share-btn:hover { opacity: 0.8; }
.btn-copy    { background: var(--soft); color: var(--black); border: 1.5px solid var(--mid); }
.btn-line    { background: #06C755; color: #fff; }
.btn-threads { background: #111; color: #fff; }

.copy-row { display: flex; gap: 10px; margin-bottom: 10px; }
.btn-copy-full {
  flex: 1; padding: 15px;
  background: var(--soft); color: var(--black);
  border: 1.5px solid var(--mid); border-radius: var(--radius);
  font-family: inherit; font-size: 13px; font-weight: 700;
  cursor: pointer; transition: all 0.2s; letter-spacing: 0.03em;
}
.btn-copy-full:hover { border-color: var(--black); }
.btn-copy-full.copied { border-color: #4A9B7F; color: #4A9B7F; }

.r-retry {
  width: 100%; padding: 15px;
  background: transparent; color: var(--gray);
  border: 1.5px solid var(--mid); border-radius: var(--radius);
  font-family: inherit; font-size: 13px; font-weight: 500;
  cursor: pointer; transition: all 0.2s; letter-spacing: 0.03em;
  margin-bottom: 20px;
}
.r-retry:hover { border-color: var(--black); color: var(--black); }

.r-credit { text-align: center; font-size: 11px; color: #ccc; letter-spacing: 0.08em; }

/* ── SLIDE TRANSITION ── */
.q-slide-wrap {
  flex: 1; position: relative; overflow: hidden;
  display: flex; flex-direction: column;
}
.q-slide {
  position: absolute; inset: 0;
  overflow-y: auto;
  transition: transform 0.38s cubic-bezier(0.4,0,0.2,1), opacity 0.3s ease;
  display: flex; flex-direction: column;
}
.q-slide.out-left  { transform: translateX(-100%); opacity: 0; }
.q-slide.out-right { transform: translateX(100%);  opacity: 0; }
.q-slide.from-right { transform: translateX(100%); opacity: 0; transition: none; }
.q-slide.from-left  { transform: translateX(-100%); opacity: 0; transition: none; }

/* checkmark */
.opt-check {
  margin-left: auto; flex-shrink: 0;
  width: 22px; height: 22px;
  opacity: 0; transform: scale(0.4) rotate(-10deg);
  transition: all 0.28s cubic-bezier(0.175,0.885,0.32,1.275);
}
.opt.selected .opt-check { opacity: 1; transform: scale(1) rotate(0deg); }

/* save image button */
.btn-save-img {
  width: 100%; padding: 16px;
  background: var(--black); color: var(--white);
  border: none; border-radius: var(--radius);
  font-family: inherit; font-size: 14px; font-weight: 700;
  cursor: pointer; letter-spacing: 0.04em;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  transition: opacity 0.2s; margin-bottom: 12px;
}
.btn-save-img:hover { opacity: 0.78; }
.btn-save-img.loading { opacity: 0.6; pointer-events: none; }

/* hidden share card for canvas rendering */
#shareCard {
  position: fixed;
  left: -9999px; top: 0;
  width: 600px;
  background: #FAFAF8;
  font-family: 'Noto Sans TC', sans-serif;
  padding: 0;
  z-index: -1;
}

/* ── ANIMATIONS ── */
@keyframes pop {
  from { transform: scale(0.5); opacity: 0; }
  to   { transform: scale(1);   opacity: 1; }
}
@keyframes up {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}
.anim { animation: up 0.35s ease both; }
</style>
</head>
<body>
<div class="phone">

<!-- ══ COVER ══ -->
<div class="screen" id="cover">
  <!-- 滿版封面圖 -->
  <div class="cover-fullscreen" id="coverImg">
    <!-- 封面圖 -->
    <img src="images/cover.jpg" alt="" class="cover-photo" onerror="this.style.display='none'">
    <!-- SVG 備用（有封面圖時自動被蓋住） -->
    <svg viewBox="0 0 430 430" xmlns="http://www.w3.org/2000/svg" class="cover-svg" id="coverSvg">
      <rect width="430" height="430" fill="#E8E5DF"/>
      <line x1="0" y1="340" x2="430" y2="340" stroke="#111" stroke-width="1.5" opacity="0.15"/>
      <ellipse cx="145" cy="295" rx="72" ry="78" fill="white" stroke="#111" stroke-width="2.5"/>
      <circle cx="145" cy="200" r="58" fill="white" stroke="#111" stroke-width="2.5"/>
      <ellipse cx="108" cy="162" rx="18" ry="26" fill="#D8D6D0" stroke="#111" stroke-width="2.2" transform="rotate(-18 108 162)"/>
      <ellipse cx="182" cy="162" rx="18" ry="26" fill="#D8D6D0" stroke="#111" stroke-width="2.2" transform="rotate(18 182 162)"/>
      <circle cx="130" cy="196" r="11" fill="#111"/><circle cx="160" cy="196" r="11" fill="#111"/>
      <circle cx="133" cy="192" r="4" fill="white"/><circle cx="163" cy="192" r="4" fill="white"/>
      <ellipse cx="145" cy="213" rx="8" ry="6" fill="#111"/>
      <path d="M133 223 Q145 234 157 223" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
      <path d="M217 310 Q255 270 265 240 Q268 225 258 220" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
      <ellipse cx="105" cy="338" rx="22" ry="12" fill="white" stroke="#111" stroke-width="2"/>
      <ellipse cx="180" cy="338" rx="22" ry="12" fill="white" stroke="#111" stroke-width="2"/>
      <rect x="112" y="350" width="66" height="22" rx="11" fill="#111"/>
      <text x="145" y="365" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="700" fill="white" letter-spacing="1">SHUGO</text>
      <ellipse cx="295" cy="295" rx="62" ry="70" fill="#111" stroke="#111" stroke-width="2"/>
      <circle cx="295" cy="207" r="52" fill="#111" stroke="#111" stroke-width="2"/>
      <polygon points="265,180 250,142 282,172" fill="#111" stroke="#111" stroke-width="1"/>
      <polygon points="325,180 340,142 308,172" fill="#111" stroke="#111" stroke-width="1"/>
      <ellipse cx="280" cy="205" rx="13" ry="10" fill="white"/><ellipse cx="310" cy="205" rx="13" ry="10" fill="white"/>
      <rect x="267" y="195" width="26" height="10" rx="2" fill="#111"/><rect x="297" y="195" width="26" height="10" rx="2" fill="#111"/>
      <line x1="285" y1="222" x2="305" y2="222" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
      <ellipse cx="258" cy="338" rx="20" ry="11" fill="#111" stroke="#111" stroke-width="1.5"/>
      <ellipse cx="330" cy="338" rx="20" ry="11" fill="#111" stroke="#111" stroke-width="1.5"/>
      <rect x="264" y="350" width="62" height="22" rx="11" fill="white" stroke="#111" stroke-width="1.5"/>
      <text x="295" y="365" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="700" fill="#111" letter-spacing="1">MONO</text>
      <text x="52" y="180" font-size="18" fill="#111" opacity="0.15">✦</text>
      <text x="370" y="160" font-size="14" fill="#111" opacity="0.12">✦</text>
    </svg>

    <!-- 封面圖自動載入 -->
    <div class="cover-overlay">
      <div class="cover-eyebrow">Shugo × Mono — Love Personality</div>
      <div class="cover-title">你是哪種戀愛生物？</div>
      <div class="cover-desc">
        暈船到失去理智的修狗，<br>
        還是封心鎖愛的石雕貓？<br>
        10 道題，測出你在愛情裡是什麼模樣。
      </div>
      <button class="cover-start" onclick="startQuiz()">開始測驗 →</button>
    </div>
  </div>
</div>

<!-- ══ QUIZ ══ -->
<div class="screen hidden" id="quiz">

  <!-- 滿版圖片區（含題目文字直接畫在圖裡） -->
  <div class="q-img-area" id="qImgArea">
    <div class="q-img-placeholder" id="qEmoji"></div>

    <!-- 只有進度條浮在圖上 -->
    <div class="quiz-nav-float">
      <button class="back-btn-float" onclick="goBack()">←</button>
      <div class="dots" id="dots"></div>
      <div class="q-count" id="qCount">1 / 10</div>
    </div>
  </div>

  <!-- 選項 -->
  <div class="opts" id="opts"></div>
  <div style="padding: 8px 24px 24px;">
    <button class="quiz-next" id="nextBtn" onclick="next()">下一題 →</button>
  </div>
</div>

<!-- ══ RESULT ══ -->
<div class="screen hidden" id="result">
  <div class="r-img" id="rImg">
    <!-- 換成你的結果角色圖 → <img src="result1.jpg" alt=""> -->
    <div class="r-img-ph">
      <span class="r-emoji-big" id="rEmoji"></span>
      <span class="r-img-label">等你畫完結果圖卡後放這裡</span>
    </div>
  </div>

  <div class="r-body">
    <div class="r-name-row">
      <div class="r-name" id="rName"></div>
      <div class="r-name-bar"></div>
    </div>

    <div class="r-tags" id="rTags"></div>

    <div class="r-stats">
      <div class="r-stat">
        <div class="r-stat-label" id="rStat1Label"></div>
        <div class="r-stat-val"   id="rStat1Val"></div>
      </div>
      <div class="r-stat">
        <div class="r-stat-label" id="rStat2Label"></div>
        <div class="r-stat-val"   id="rStat2Val"></div>
      </div>
    </div>

    <div class="r-desc-card" id="rDesc"></div>
    <div class="r-roast" id="rRoast"></div>

    <!-- 交往首選 & 當朋友就好 -->
    <div class="r-match-row">
      <div class="r-match-box r-match-yes">
        <div class="r-match-label">💗 交往首選</div>
        <div class="r-match-img">
          <div class="r-match-img-ph" id="rMatchPh">💗</div>
          <!-- 換成你的角色圖 → <img src="match.jpg" alt=""> -->
        </div>
        <div class="r-match-name" id="rMatchName"></div>
        <div class="r-match-desc" id="rMatchDesc"></div>
      </div>
      <div class="r-match-box r-match-no">
        <div class="r-match-label">🤝 當朋友就好</div>
        <div class="r-match-img">
          <div class="r-match-img-ph" id="rAvoidPh">🤝</div>
          <!-- 換成你的角色圖 → <img src="avoid.jpg" alt=""> -->
        </div>
        <div class="r-match-name" id="rAvoidName"></div>
        <div class="r-match-desc" id="rAvoidDesc"></div>
      </div>
    </div>

    <div class="r-share-label">分享給朋友，看看他們是哪種戀愛生物 👇</div>

    <!-- 儲存圖片按鈕 -->
    <button class="btn-save-img" id="saveImgBtn" onclick="saveResultImage()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      儲存結果圖片
    </button>

    <div class="r-share-row">
      <a class="r-share-btn btn-line" id="lineBtn" href="#" target="_blank" rel="noopener">
        <svg width="18" height="18" viewBox="0 0 40 40"><rect width="40" height="40" rx="8" fill="none"/><path d="M33 19.2C33 13.7 27.6 9.2 21 9.2S9 13.7 9 19.2c0 4.9 4.3 9 10.2 9.8.4.1.9.3 1 .6.1.3 0 1.1 0 1.1l-.2 1c-.1.3-.3 1.3 1.1.7 1.4-.6 7.4-4.4 10.1-7.5 1.9-2 2.8-4.1 2.8-6.7z" fill="#fff"/></svg>

          <div style="font-size:14px;color:#111;font-weight:700;margin-bottom:6px">我的戀愛人格是「${r.name}」${r.emoji}</div>

          <div style="font-size:12px;color:#9A9690;margin-bottom:6px">#修狗 #面癱貓 #sansanink</div>
          <div style="font-size:12px;color:#9A9690;">${siteUrl}</div>
        </div>
      </div>
    </div>`;

  setTimeout(() => {
    html2canvas(card.firstElementChild, {
      scale: 2, useCORS: true,
      backgroundColor: '#FAFAF8', logging: false
    }).then(canvas => {
      btn.classList.remove('loading');
      btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> 儲存結果圖片`;
      const filename = `戀愛人格_${r.name.replace(/\s/g,'')}.png`;
      if (navigator.share && /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent)) {
        canvas.toBlob(blob => {
          const file = new File([blob], filename, { type:'image/png' });
          navigator.share({
            title: `我的戀愛人格是「${r.name}」${r.emoji}`,
            text: `我的戀愛人格是「${r.name}」${r.emoji}\n來測測你是哪種戀愛生物？\n#修狗 #面癱貓 #sansanink\nhttps://shugo-mono.netlify.app/`,
            files: [file]
          })
            .catch(() => downloadCanvas(canvas, filename));
        }, 'image/png');
      } else {
        downloadCanvas(canvas, filename);
      }
    }).catch(() => {
      btn.classList.remove('loading');
      btn.innerHTML = `⚠️ 生成失敗，請截圖儲存`;
    });
  }, 120);
}

function downloadCanvas(canvas, filename) {
  const a = document.createElement('a');
  a.download = filename;
  a.href = canvas.toDataURL('image/png');
  a.click();
}

const LABELS = ['A','B','C','D','E'];
let cur = 0, votes = {fire:0, paw:0, star:0, fish:0, rock:0}, sel = null;

function buildDots() {
  const w = document.getElementById('dots');
  w.innerHTML = '';
  Qs.forEach((_,i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i < cur ? ' done' : i === cur ? ' active' : '');
    w.appendChild(d);
  });
}

function renderQ() {
  const q = Qs[cur];
  sel = null;
  buildDots();
  document.getElementById('qCount').textContent = `${cur+1} / ${Qs.length}`;
  document.getElementById('qEmoji').textContent = q.emoji;

  // 背景圖：把 images/q1.jpg ~ q10.jpg 放進 images 資料夾
  const imgArea = document.getElementById('qImgArea');
  const imgPath = `images/q${cur+1}.jpg`;
  const img = new Image();
  img.onload = () => {
    imgArea.style.backgroundImage = `url(${imgPath})`;
    imgArea.style.backgroundSize = 'cover';
    imgArea.style.backgroundPosition = 'center';
    document.getElementById('qEmoji').style.opacity = '0';
  };
  img.onerror = () => {
    imgArea.style.backgroundImage = '';
    document.getElementById('qEmoji').style.opacity = '1';
  };
  img.src = imgPath;
  document.getElementById('nextBtn').textContent = cur === Qs.length - 1 ? '查看結果 →' : '下一題 →';
  document.getElementById('nextBtn').classList.remove('on');

  const wrap = document.getElementById('opts');
  wrap.innerHTML = '';
  q.opts.forEach((o,i) => {
    const btn = document.createElement('button');
    btn.className = 'opt anim';
    btn.style.animationDelay = (i*0.07)+'s';
    btn.innerHTML = `
      <span class="opt-lbl">${LABELS[i]}</span>
      <span style="flex:1;text-align:left">${o.t}</span>
      <svg class="opt-check" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="11" cy="11" r="10" fill="#FAFAF8" stroke="#111" stroke-width="1.5"/>
        <path d="M6.5 11.5l3.2 3.2 5.8-7" stroke="#111" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>`;
    btn.onclick = () => {
      wrap.querySelectorAll('.opt').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      sel = o.r;
      document.getElementById('nextBtn').classList.add('on');
    };
    wrap.appendChild(btn);
  });
}

function slideQ(direction) {
  const slide = document.getElementById('qImgArea');
  const outClass  = direction > 0 ? 'out-left'    : 'out-right';
  const inClass   = direction > 0 ? 'from-right'  : 'from-left';

  slide.classList.add(outClass);
  setTimeout(() => {
    slide.classList.remove(outClass);
    renderQ();
    slide.classList.add(inClass);
    requestAnimationFrame(() => requestAnimationFrame(() => {
      slide.classList.remove(inClass);
    }));
  }, 320);
}

function switchScreen(from, to) {
  const f = document.getElementById(from);
  const t = document.getElementById(to);
  f.classList.add('exit');
  setTimeout(() => {
    f.classList.remove('exit');
    f.classList.add('hidden');
    t.classList.remove('hidden');
    t.scrollTop = 0;
  }, 280);
}

function startQuiz() {
  cur = 0; votes = {fire:0, paw:0, star:0, fish:0, rock:0}; sel = null;
  renderQ();
  switchScreen('cover','quiz');
}

function next() {
  if (sel === null) return;
  votes[sel]++;
  cur++;
  document.getElementById('nextBtn').classList.remove('on');
  if (cur >= Qs.length) { showResult(); return; }
  document.getElementById('quiz').scrollTop = 0;
  slideQ(1);
}

function goBack() {
  if (cur === 0) { switchScreen('quiz','cover'); return; }
  cur--; votes = {fire:0, paw:0, star:0, fish:0, rock:0}; sel = null;
  document.getElementById('nextBtn').classList.remove('on');
  document.getElementById('quiz').scrollTop = 0;
  slideQ(-1);
}

function showResult() {
  const order = ['fire','paw','star','fish','rock'];
  const winner = order.reduce((a, b) => votes[a] >= votes[b] ? a : b);
  const r = Rs.find(x => x.img === winner);
  currentResult = r;

  const imgWrap = document.getElementById('rImg');
  imgWrap.innerHTML = ResultSVGs[r.img];

  document.getElementById('rName').textContent = r.name;
  document.getElementById('rDesc').textContent = r.desc;
  document.getElementById('rRoast').textContent = r.roast;

  const tagWrap = document.getElementById('rTags');
  tagWrap.innerHTML = '';
  r.tags.forEach(tag => {
    const el = document.createElement('span');
    el.className = 'r-tag'; el.textContent = tag;
    tagWrap.appendChild(el);
  });

  document.getElementById('rStat1Label').textContent = r.stat1.label;
  document.getElementById('rStat1Val').textContent   = r.stat1.val;
  document.getElementById('rStat2Label').textContent = r.stat2.label;
  document.getElementById('rStat2Val').textContent   = r.stat2.val;

  // match section
  document.getElementById('rMatchName').textContent = r.match;
  document.getElementById('rMatchDesc').textContent = r.matchDesc;
  document.getElementById('rAvoidName').textContent = r.avoid;
  document.getElementById('rAvoidDesc').textContent = r.avoidDesc;

  const siteUrl = 'https://shugo-mono.netlify.app/';
  const url = encodeURIComponent(siteUrl);
  const shareMsg = encodeURIComponent(`我的戀愛人格是「${r.name}」${r.emoji}\n來測測你是哪種戀愛生物？\n#修狗 #面癱貓 #sansanink\n${siteUrl}`);

  const lineBtn = document.getElementById('lineBtn');
  lineBtn.href = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent)
    ? `https://line.me/R/share?text=${shareMsg}`
    : `https://social-plugins.line.me/lineit/share?url=${url}&text=${shareMsg}`;

  document.getElementById('threadsBtn').href =
    `https://www.threads.net/intent/post?text=${shareMsg}`;

  const btn = document.getElementById('copyBtn');
  btn.textContent = '📋 複製測驗連結';
  btn.classList.remove('copied');

  switchScreen('quiz','result');
}

function copyUrl() {
  navigator.clipboard.writeText(window.location.href).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = '✓ 已複製！';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = '📋 複製測驗連結';
      btn.classList.remove('copied');
    }, 2500);
  });
}

function restart() {
  cur = 0; votes = {fire:0, paw:0, star:0, fish:0, rock:0}; sel = null;
  currentResult = null;
  const btn = document.getElementById('saveImgBtn');
  if (btn) {
    btn.classList.remove('loading');
    btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> 儲存結果圖片`;
  }
  renderQ();
  switchScreen('result','cover');
}
</script>
